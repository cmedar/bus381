services:

  # Kafka in KRaft mode — no Zookeeper, saves ~256MB on t2.small
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 104857600
      KAFKA_LOG_SEGMENT_BYTES: 10485760
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # mo-bi.ro poller — publishes route 381 positions to Kafka every 90s
  poller:
    build: .
    command: python ingestion/poller.py
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATA_DIR=/data
    volumes:
      - /home/bus381/data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit dashboard
  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATA_DIR=/data
    volumes:
      - /home/bus381/data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # session tracker — sessionizes bus-crossings into journeys, writes sessions.json + journeys.csv
  session-tracker:
    build: .
    command: python ingestion/session_tracker.py
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATA_DIR=/data
    volumes:
      - /home/bus381/data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # crossing detector — watches stb-arrivals, publishes to bus-crossings
  crossing-detector:
    build: .
    command: python ingestion/crossing_detector.py
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATA_DIR=/data
    volumes:
      - /home/bus381/data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

